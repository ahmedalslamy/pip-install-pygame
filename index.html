<!DOCTYPE html>
<html>
<head>
    <title>BRUN Match-3</title>
    <style>
        body { background: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        canvas { background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const SIZE = 8, TILE = 50;
    const COLORS = ['#FF5252', '#4CAF50', '#2196F3', '#FFEB3B', '#9C27B0', '#FF9800'];
    let grid = [], selected = null;

    // إنشاء الشبكة
    for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                ctx.fillStyle = grid[r][c];
                ctx.roundRect(c * TILE + 5, r * TILE + 5, TILE - 10, TILE - 10, 10);
                ctx.fill();
                if (selected && selected.r === r && selected.c === c) {
                    ctx.strokeStyle = 'black'; ctx.lineWidth = 3; ctx.stroke();
                }
            }
        }
    }

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const c = Math.floor((e.clientX - rect.left) / TILE);
        const r = Math.floor((e.clientY - rect.top) / TILE);

        if (!selected) selected = {r, c};
        else {
            if (Math.abs(selected.r - r) + Math.abs(selected.c - c) === 1) {
                let temp = grid[r][c];
                grid[r][c] = grid[selected.r][selected.c];
                grid[selected.r][selected.c] = temp;
            }
            selected = null;
        }
        draw();
    };

    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
        this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
    };

    draw();
</script>
</body>
</html>
