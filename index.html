<!DOCTYPE html>
<html>
<head>
    <title>BRUN Candy Match</title>
    <style>
        body { 
            background: #fce4ec; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
            font-family: 'Arial', sans-serif;
        }
        #ui { margin-bottom: 10px; font-size: 24px; color: #ad1457; font-weight: bold; }
        canvas { 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            cursor: pointer;
            background-image: url('bg.jpg'); /* صورة الخلفية */
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const SIZE = 8, TILE = 50;
    let grid = [], selected = null, score = 0;

    // تحميل الصور
    const images = {};
    for(let i=1; i<=5; i++) {
        images[i] = new Image();
        images[i].src = `${i}.png`; // سيحاول تحميل 1.png, 2.png...
    }

    // بناء المصفوفة بأرقام تمثل الصور
    function initGrid() {
        for (let r = 0; r < SIZE; r++) {
            grid[r] = [];
            for (let c = 0; c < SIZE; c++) grid[r][c] = Math.floor(Math.random() * 5) + 1;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                let img = images[grid[r][c]];
                if (img.complete) {
                    ctx.drawImage(img, c * TILE + 5, r * TILE + 5, TILE - 10, TILE - 10);
                } else {
                    // إذا لم ترفع الصور بعد، سيرسم مربعات كاحتياط
                    ctx.fillStyle = "rgba(255,255,255,0.3)";
                    ctx.fillRect(c * TILE + 5, r * TILE + 5, TILE - 10, TILE - 10);
                }
                
                if (selected && selected.r === r && selected.c === c) {
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; 
                    ctx.strokeRect(c * TILE + 2, r * TILE + 2, TILE - 4, TILE - 4);
                }
            }
        }
    }

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const c = Math.floor((e.clientX - rect.left) / TILE);
        const r = Math.floor((e.clientY - rect.top) / TILE);

        if (!selected) selected = {r, c};
        else {
            if (Math.abs(selected.r - r) + Math.abs(selected.c - c) === 1) {
                let temp = grid[r][c];
                grid[r][c] = grid[selected.r][selected.c];
                grid[selected.r][selected.c] = temp;
                score += 10;
                scoreEl.innerText = score;
            }
            selected = null;
        }
        draw();
    };

    initGrid();
    setInterval(draw, 100); // تحديث الرسم المستمر
</script>
</body>
</html>
